<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Fiori - Lot Scanner</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Fiori</h1>
    <nav class="tab-nav">
      <a href="/" class="tab">Notes</a>
      <a href="/scanner.html" class="tab active">Lot Scanner</a>
    </nav>
  </header>

  <main>
    <!-- Upload Section -->
    <section id="upload-section" class="card">
      <label>Upload photo of product box</label>
      <div id="drop-zone" class="drop-zone">
        <input type="file" id="file-input" accept="image/*" capture="environment" hidden>
        <div id="drop-placeholder" class="drop-placeholder">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <path d="m21 15-5-5L5 21"/>
          </svg>
          <p>Tap to take photo or upload</p>
          <p class="hint">Supports JPG, PNG, HEIC</p>
        </div>
        <img id="preview-img" class="preview-img hidden" alt="Preview">
      </div>
      <div class="actions">
        <button id="remove-btn" class="btn-secondary hidden">Remove</button>
        <button id="scan-btn" class="btn-primary" disabled>Scan Product</button>
      </div>
    </section>

    <!-- Loading -->
    <section id="loading" class="card hidden">
      <div class="loader"></div>
      <p>Scanning for lot numbers and expiry dates...</p>
    </section>

    <!-- Results Section -->
    <section id="results-section" class="card hidden">
      <div class="output-header">
        <h2>Scan Results</h2>
        <div class="output-actions">
          <button id="copy-btn" class="btn-icon" title="Copy to clipboard">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
          </button>
          <button id="new-scan-btn" class="btn-secondary">New Scan</button>
        </div>
      </div>
      <div id="results-output" class="results-grid"></div>
    </section>

    <!-- Error -->
    <section id="error-section" class="card hidden">
      <p class="error-text" id="error-msg"></p>
      <button id="retry-btn" class="btn-primary">Try Again</button>
    </section>

    <!-- Scan History -->
    <section id="history-section" class="card hidden">
      <div class="output-header">
        <h2>Scan History</h2>
        <div class="output-actions">
          <button id="copy-history-btn" class="btn-icon" title="Copy all">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
          </button>
          <button id="clear-history-btn" class="btn-secondary btn-small">Clear All</button>
        </div>
      </div>
      <div id="history-output" class="results-grid"></div>
    </section>
  </main>

  <script src="scanner.js"></script>
</body>
</html>
